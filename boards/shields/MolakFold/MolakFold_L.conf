CONFIG_ZMK_POINTING=y
CONFIG_NFCT_PINS_AS_GPIOS=y
# CONFIG_ZMK_BLE=y
CONFIG_BT_CTLR_PHY_2M=n

# Keep persistence symbols explicit to avoid split-side config drift.
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_BT_SETTINGS=y
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=30
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10

CONFIG_SPI=y
CONFIG_INPUT=y

CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

CONFIG_ZMK_USB_LOGGING=y
CONFIG_LOG=y

CONFIG_PMW3610_ALT=y
CONFIG_PMW3610_ALT_INIT_POWER_UP_EXTRA_DELAY_MS=200
CONFIG_PMW3610_ALT_LOG_LEVEL_ERR=y
CONFIG_PMW3610_ALT_RUN_DOWNSHIFT_TIME_MS=3264
CONFIG_PMW3610_ALT_REST1_SAMPLE_TIME_MS=20
CONFIG_PMW3610_ALT_REPORT_INTERVAL_MIN=8
CONFIG_PMW3610_ALT_SMART_ALGORITHM=y

# Match stack sizes with Central to prevent BLE notification buffer errors (-128)
CONFIG_ZMK_BLE_THREAD_STACK_SIZE=4096
CONFIG_ZMK_LOW_PRIORITY_THREAD_STACK_SIZE=4096
CONFIG_INPUT_THREAD_STACK_SIZE=4096

# Prevent bt_keys ENOMEM: overwrite oldest bond when key table is full
CONFIG_BT_KEYS_OVERWRITE_OLDEST=y
CONFIG_BT_MAX_PAIRED=5
# Allow unauthenticated re-pairing to overwrite stale bond (fixes Security failed err 9)
CONFIG_BT_SMP_ALLOW_UNAUTH_OVERWRITE=y

CONFIG_ZMK_BATTERY_REPORTING=y
# CONFIG_BT_BAS=y

# CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
# CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
